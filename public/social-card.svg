  <text x="116" y="123" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="38" font-weight="700" fill="#00ff9f">&gt;$</text>
  <text x="172" y="122" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="34" font-weight="700" fill="#e0e0e0">Run402</text>

